version: '3.8'

services:
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: sommelier-backend
    ports:
      - "8000:8000"
    networks:
      - wine-net
    restart: always

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: sommelier-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - wine-net
    restart: always

networks:
  wine-net:
    driver: bridge
